name: ci_trama_v212

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master", "develop"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qualidade:
    name: qualidade_build_test_lint_cobertura
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: instalar_dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pytest-cov

      - name: lint
        run: ruff check src tests

      - name: testes_com_cobertura
        run: |
          pytest \
            --maxfail=1 \
            --cov=src/trama \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=30

      - name: build_nativo
        run: bash scripts/build_native_stub.sh

      - name: upload_cobertura
        uses: actions/upload-artifact@v4
        with:
          name: cobertura_xml
          path: coverage.xml

  seguranca:
    name: seguranca_sast_dependencias_segredos
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: instalar_ferramentas_segurança
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install bandit pip-audit detect-secrets

      - name: sast_bandit
        run: bandit -q -r src/trama -x tests -b .bandit-baseline.json

      - name: consistencia_dependencias
        run: python -m pip check

      - name: auditoria_dependencias
        continue-on-error: true
        run: pip-audit --progress-spinner off

      - name: scan_segredos_diff
        run: |
          detect-secrets-hook --baseline .secrets.baseline $(git ls-files)

  suite_critica_v212:
    name: suite_critica_v212
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: instalar_dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: executar_suite_critica_v212
        run: |
          python -m trama.cli testes-avancados-v212 \
            --perfil rapido \
            --saida-json .local/test-results/v212_relatorio_ci.json \
            --saida-md .local/test-results/v212_relatorio_ci.md \
            --json

      - name: upload_relatorios_v212
        uses: actions/upload-artifact@v4
        with:
          name: suite_critica_v212_relatorios
          path: .local/test-results/v212_relatorio_ci.*

  gate_v212:
    name: gate_v212_obrigatorio
    needs: [qualidade, seguranca, suite_critica_v212]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: validar_jobs_criticos
        run: |
          if [ "${{ needs.qualidade.result }}" != "success" ] || [ "${{ needs.seguranca.result }}" != "success" ] || [ "${{ needs.suite_critica_v212.result }}" != "success" ]; then
            echo "Gate de qualidade v2.1.2 falhou (merge bloqueado)."
            exit 1
          fi
          echo "Gate v2.1.2 aprovado."

  suite_critica_v213:
    name: suite_critica_v213
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: instalar_dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: executar_suite_critica_v213
        run: |
          python -m trama.cli testes-avancados-v213 \
            --perfil rapido \
            --saida-json .local/test-results/v213_relatorio_ci.json \
            --saida-md .local/test-results/v213_relatorio_ci.md \
            --json

      - name: upload_relatorios_v213
        uses: actions/upload-artifact@v4
        with:
          name: suite_critica_v213_relatorios
          path: .local/test-results/v213_relatorio_ci.*

  postgres_real_v215:
    name: postgres_real_v215
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: trama
          POSTGRES_PASSWORD: trama
          POSTGRES_DB: trama_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trama -d trama_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TRAMA_TEST_PG_DSN: postgresql://trama:trama@127.0.0.1:5432/trama_ci
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: instalar_dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,db]

      - name: suite_postgres_real_v215
        run: |
          pytest -q tests/test_db_runtime_postgres_v215.py

      - name: suite_schema_capabilities_v216_v217
        run: |
          pytest -q tests/test_db_capacidades_v217.py tests/test_cli_db_capacidades_v217.py

  gate_v213:
    name: gate_v213_obrigatorio
    needs: [qualidade, seguranca, suite_critica_v213, postgres_real_v215]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: validar_jobs_criticos_v213
        run: |
          if [ "${{ needs.qualidade.result }}" != "success" ] || [ "${{ needs.seguranca.result }}" != "success" ] || [ "${{ needs.suite_critica_v213.result }}" != "success" ] || [ "${{ needs.postgres_real_v215.result }}" != "success" ]; then
            echo "Gate de qualidade v2.1.3 falhou (merge bloqueado)."
            exit 1
          fi
          echo "Gate v2.1.3+v2.1.15 aprovado."
